{% for item in order['items'] %}
<div class="product">
  <img src="{{ url_for('static', filename='shoes/' + (item['images'][0] if item.get('images') else 'placeholder.jpg')) }}" alt="{{ item['name'] }}">
  <div>
    <strong>{{ item['name'] }}</strong><br>
    Qty: {{ item['quantity'] }} | GH₵ {{ item['price'] }}
  </div>
</div>
{% endfor %}
